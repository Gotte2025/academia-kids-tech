<!DOCTYPE html>
<html>
<head>
  <title>Admin PRO</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    .xp10 { background: #4CAF50; color: white; }
    .xp20 { background: #2196F3; color: white; }
    .xp30 { background: #ff9800; color: white; }

  </style>
</head>

<body>

<h2>🎛️ Panel Admin - Academia Kids Tech</h2>

<a href="/ranking">
  <button>🏆 Ver Ranking</button>
</a>

<hr>

<h3>➕ Crear Alumno</h3>
<form method="POST">
  <input name="username" placeholder="Usuario"><br><br>
  <input name="password" placeholder="Clave"><br><br>
  <button type="submit">Crear</button>
</form>

<hr>

<h3>📊 Alumnos</h3>

{% for user in users %}
<div class="card">
  <b>{{user[1]}}</b><br>
  ⭐ XP: {{user[3]}}<br>
  🏆 Nivel: {{user[4]}}<br><br>

  <a href="/add_xp/{{user[1]}}/10"><button class="xp10">+10 XP</button></a>
  <a href="/add_xp/{{user[1]}}/20"><button class="xp20">+20 XP</button></a>
  <a href="/add_xp/{{user[1]}}/30"><button class="xp30">+30 XP</button></a>
</div>
{% endfor %}

</body>
</html>
